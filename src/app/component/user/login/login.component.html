<div class="card mx-auto mt-5" style="max-width: 400px;">
  <div class="card-body">
    <h3 class="card-title text-center mb-4">Login</h3>

    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" [(ngModel)]="loginRequest.email" name="email" class="form-control" />
    </div>

    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" [(ngModel)]="loginRequest.password" name="password" class="form-control" />
    </div>

    <button type="submit" (click)="login()" class="btn btn-primary w-100">Login</button>

    <p class="text-center mt-3">
      Don't have an account? <a routerLink="/signUp">Register</a>
    </p>
  </div>
</div>

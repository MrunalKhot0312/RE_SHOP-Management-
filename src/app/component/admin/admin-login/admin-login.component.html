<div class="card mx-auto mt-5 " style="max-width: 400px;">
    <div class="card-body">
        <h3 class="card-title  text-center mb-4">Login</h3>
        <div *ngIf="message"class="alert alert-danger">{{message}}</div>

        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" [(ngModel)]="loginRequest.username" class="form-control">
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" [(ngModel)]="loginRequest.password" class="form-control">
        </div>
        <button (click)="login()"class=btn btn-primary w-100>
            <span *ngIf="!isLoading">Login</span>
            <span class="spinner-border spinner-border-sm" *ngIf="isLoading"></span>
        </button>
    </div>
</div>

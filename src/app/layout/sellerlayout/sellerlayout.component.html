<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seller Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-2 bg-dark text-white min-vh-100 p-3">
      <h4 class="text-center mb-4">Seller Panel</h4>

      <a href="#" class="d-block text-white text-decoration-none py-2">Dashboard</a>
      <a href="#" class="d-block text-white text-decoration-none py-2">Products</a>
      <a href="#" class="d-block text-white text-decoration-none py-2">Add Product</a>
      <a href="#" class="d-block text-white text-decoration-none py-2">Orders</a>
      <a href="#" class="d-block text-white text-decoration-none py-2">Payments</a>
      <a href="#" class="d-block text-white text-decoration-none py-2">Profile</a>
      <a href="#" class="d-block text-white text-decoration-none py-2">Logout</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">

      <!-- Top Bar -->
      <div class="d-flex justify-content-between align-items-center bg-white p-3 shadow-sm rounded mb-4">
        <h5 class="mb-0">Welcome Seller 👋</h5>
        <button class="btn btn-dark btn-sm">View Store</button>
      </div>

      <!-- Cards -->
      <div class="row g-3">

        <div class="col-md-3">
          <div class="card shadow-sm text-center p-3">
            <h6>Total Products</h6>
            <h3>120</h3>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow-sm text-center p-3">
            <h6>Orders</h6>
            <h3>45</h3>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow-sm text-center p-3">
            <h6>Revenue</h6>
            <h3>₹25,000</h3>
          </div>
        </div>

        <div class="col-md-3">
          <div class="card shadow-sm text-center p-3">
            <h6>Pending</h6>
            <h3>5</h3>
          </div>
        </div>

      </div>

      <!-- Table -->
      <div class="card mt-4 shadow-sm">
        <div class="card-body">
          <h5>Recent Orders</h5>

          <table class="table table-striped mt-3">
            <thead>
              <tr>
                <th>Order ID</th>
                <th>Customer</th>
                <th>Status</th>
                <th>Amount</th>
              </tr>
            </thead>

            <tbody>
              <tr>
                <td>#101</td>
                <td>Rahul</td>
                <td><span class="badge bg-success">Completed</span></td>
                <td>₹1200</td>
              </tr>

              <tr>
                <td>#102</td>
                <td>Asha</td>
                <td><span class="badge bg-warning">Pending</span></td>
                <td>₹800</td>
              </tr>
            </tbody>

          </table>

        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>RE-SHOP</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="d-flex flex-column min-vh-100">

  <!-- 🌿 Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark fixed-top shadow"
       style="background-color:#2e7d32;">

    <div class="container">

      <!-- Logo -->
      <a class="navbar-brand fw-bold text-warning fs-4">
        <i class="bi bi-recycle me-2"></i>RE-SHOP
      </a>

      <!-- Toggle -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Menu -->
      <div class="collapse navbar-collapse" id="navbarNav">

        <!-- Center Links -->
        <ul class="navbar-nav mx-auto text-center gap-lg-3">

          <li class="nav-item">
            <a class="nav-link active text-warning" href="#">
              <i class="bi bi-house-door me-1"></i> Home
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-info-circle me-1"></i> About
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="#">
              <i class="bi bi-chat-dots me-1"></i> Enquiry
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" routerLink="/seller/product">
              <i class="bi bi-bag me-1"></i> Products
            </a>
          </li>

        </ul>

        <!-- Right Buttons -->
        <div class="d-flex gap-2">

          <a routerLink="/login" class="btn btn-outline-light rounded-pill px-3">
            Login
          </a>

          <a routerLink="/signUp" class="btn btn-light rounded-pill px-3 fw-semibold">
            Sign Up
          </a>

          <a routerLink="/signupseller" class="btn btn-warning rounded-pill px-3 fw-semibold">
            Seller
          </a>

        </div>

      </div>
    </div>
  </nav>


  <!-- Spacer -->
  <div style="height:80px;"></div>

  <!-- Content -->
  <div class="container flex-grow-1 my-4">

    <!-- Sample Content -->
    <div class="text-center">
      <h2 class="fw-bold text-success">Welcome to RE-SHOP ♻️</h2>
      <p class="text-muted">
        Buy & Sell Recyclable Products Easily and Sustainably.
      </p>
    </div>
  <router-outlet></router-outlet>
  </div>

</div>


</body>
</html>

<div class="container mt-4">

  <h2 class="mb-3">Manage Category</h2>

  <!-- FORM -->
  <div class="card p-3 shadow-sm mb-4">
    <h4>{{ isEdit ? 'Edit Category' : 'Add New Category' }}</h4>

    <div class="row mt-3">

      <!-- NAME -->
      <div class="col-md-6 mb-3">
        <label>Category Name</label>
        <input class="form-control"
               [(ngModel)]="newCategory.name"
               name="categoryName"
               placeholder="Enter Category Name">
      </div>

      <!-- IMAGE -->
      <div class="col-md-6 mb-3">
        <label>Image</label>
        <input type="file"
               class="form-control"
               (change)="onImageSelected($event)">
      </div>

      <!-- PREVIEW -->
      <div class="col-md-6 mb-3" *ngIf="imagePreview">
        <label>Preview</label><br>
        <img [src]="imagePreview"
             class="img-thumbnail"
             style="width: 120px;">
      </div>

      <!-- BUTTONS -->
      <div class="col-12 mt-2">
        <button class="btn btn-primary"
                *ngIf="!isEdit"
                (click)="addCategory()">Add</button>

        <button class="btn btn-success"
                *ngIf="isEdit"
                (click)="updateCategory()">Update</button>

        <button class="btn btn-secondary ms-2"
                (click)="resetForm()">Clear</button>
      </div>

    </div>
  </div>

  <!-- TABLE -->
  <table class="table table-bordered shadow-sm">
    <thead class="table-light">
      <tr>
        <th>ID</th>
        <th>Image</th>
        <th>Name</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let c of categories">
        <td>{{ c.id }}</td>

        <td>
          <img [src]="c.imageUrl"
               class="img-thumbnail"
               style="width: 70px; height: 70px;">
        </td>

        <td>{{ c.name }}</td>

        <td>
          <button class="btn btn-sm btn-warning"
                  (click)="editCategory(c)">Edit</button>

          <button class="btn btn-sm btn-danger ms-1"
                  (click)="deleteCategory(c.id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>

</div>
